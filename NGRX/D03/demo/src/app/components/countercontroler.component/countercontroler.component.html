<div class="max-w-md mx-auto rounded-2xl bg-gray-800 shadow-xl p-8 border border-gray-800">
  <h2 class="text-2xl font-bold text-gray-100 mb-6 text-center">Counter Control</h2>

  <div class="text-center mb-8">
    <p class="text-white text-sm uppercase tracking-wider">Current Value</p>

    <h1 class="text-6xl font-extrabold text-indigo-600 mt-2">
      {{ counter$ | async }}
    </h1>
    <h1 class="text-6xl font-extrabold text-indigo-600 mt-2">Douple : {{ douple$ | async }}</h1>
    <h1 class="text-6xl font-extrabold text-indigo-600 mt-2">More : {{ more$ | async }}</h1>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <button
      (click)="decrement()"
      class="rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold py-3 transition duration-200 shadow-lg"
    >
      −1
    </button>

    <button
      (click)="reset()"
      class="rounded-xl bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 transition duration-200"
    >
      Reset
    </button>

    <button
      (click)="increment()"
      class="rounded-xl bg-green-500 hover:bg-green-600 text-white font-semibold py-3 transition duration-200 shadow-lg"
    >
      +1
    </button>
  </div>
</div>
