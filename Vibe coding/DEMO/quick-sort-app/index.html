<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSort App</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <h1>QuickSort Algorithm Visualizer</h1>
    
        <input type="text" id="numberInput" placeholder="e.g., 5,3,8,1,2">
        <button id="sortButton">Sort Numbers</button>
    
        <h2>Before Sorting:</h2>
        <div id="beforeSortDisplay" class="result"></div>
    
        <h2>Sorted Result:</h2>
        <div id="result" class="result"></div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
