<div class="container mt-4">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white py-3">
        <h5 class="mb-0">Add New Product</h5>
      </div>
  
      <div class="card-body p-4">
        <form>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-secondary">Product Name</label>
              <input [(ngModel)]="obj.name" name="name" type="text" class="form-control" placeholder="Enter product name">
            </div>
            <div class="col-md-6">
              <label class="form-label text-secondary">Category</label>
              <select [(ngModel)]="obj.category" name="category" class="form-select text-muted">
                <option value="" selected>Select category</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
              </select>
            </div>
          </div>
  
          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label text-secondary">Price</label>
              <input [(ngModel)]="obj.price" name="price" type="text" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary">Quantity</label>
              <input [(ngModel)]="obj.quantity" name="quantity" type="number" class="form-control" placeholder="0">
            </div>
          </div>
  
          <div class="mb-3">
            <label class="form-label text-secondary">Description</label>
            <textarea [(ngModel)]="obj.description" name="description" class="form-control" rows="4" placeholder="Product description"></textarea>
          </div>
  
          <div class="mb-3">
            <label class="form-label text-secondary">Image URL</label>
            <input [(ngModel)]="obj.imageUrl" name="imageUrl" type="text" class="form-control" placeholder="Enter image URL">
          </div>
  
          <div class="mb-4">
            <label class="form-label d-block text-secondary">Status</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="status" id="active" value="active" [(ngModel)]="obj.status">
              <label class="form-check-label text-muted" for="active">Active</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="status" id="inactive" value="inactive" [(ngModel)]="obj.status">
              <label class="form-check-label text-muted" for="inactive">Inactive</label>
            </div>
          </div>
  
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary px-4 py-2">Cancel</button>
            <button (click)="setProduct()" type="button" class="btn btn-primary px-4 py-2">Save Product</button>
          </div>
        </form>
      </div>
    </div>
  </div>
